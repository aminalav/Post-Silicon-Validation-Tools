name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  backend:
    name: Build C++ core + Python tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build toolchain
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build

      - name: Install package (compiles pybind11 extension)
        run: pip install -e ".[dev]"

      - name: Verify C++ backend is active
        run: python -c "from sep import core; assert core.BACKEND == 'cpp', core.BACKEND; print('backend:', core.BACKEND)"

      - name: Lint
        run: ruff check sep tests

      - name: Run tests
        run: pytest -q

  frontend:
    name: Build React dashboard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install and build
        working-directory: frontend
        run: |
          npm install
          npm run build
